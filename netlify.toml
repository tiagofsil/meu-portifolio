[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"

# Redirecionamento automático para HTTPS (a Netlify já faz isso por padrão
# em domínios *.netlify.app e domínios próprios com SSL habilitado, mas a
# regra abaixo garante o comportamento mesmo em configurações customizadas).
[[redirects]]
  from = "http://SEU-DOMINIO.com/*"
  to = "https://SEU-DOMINIO.com/:splat"
  status = 301
  force = true
